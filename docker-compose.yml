services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${KOMARI_DB_ROOT_PASS:-change-root-password}
      MYSQL_DATABASE: ${KOMARI_DB_NAME:-komari}
      MYSQL_USER: ${KOMARI_DB_USER:-komari}
      MYSQL_PASSWORD: ${KOMARI_DB_PASS:-change-me}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${KOMARI_DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  komari:
    build:
      context: .
      dockerfile: Dockerfile.compose
    image: komari-local:latest
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${KOMARI_PORT:-25774}:25774"
    environment:
      KOMARI_DB_TYPE: mysql
      KOMARI_DB_HOST: mysql
      KOMARI_DB_PORT: 3306
      KOMARI_DB_USER: ${KOMARI_DB_USER:-komari}
      KOMARI_DB_PASS: ${KOMARI_DB_PASS:-change-me}
      KOMARI_DB_NAME: ${KOMARI_DB_NAME:-komari}
      KOMARI_LISTEN: 0.0.0.0:25774
      KOMARI_CORS_ALLOWED_ORIGINS: ${KOMARI_CORS_ALLOWED_ORIGINS:-}
      KOMARI_WS_ALLOWED_ORIGINS: ${KOMARI_WS_ALLOWED_ORIGINS:-}
      KOMARI_LOGIN_MAX_FAILURES: ${KOMARI_LOGIN_MAX_FAILURES:-8}
      KOMARI_LOGIN_WINDOW: ${KOMARI_LOGIN_WINDOW:-10m}
      KOMARI_LOGIN_LOCKOUT: ${KOMARI_LOGIN_LOCKOUT:-15m}
      KOMARI_HTTP_READ_HEADER_TIMEOUT: ${KOMARI_HTTP_READ_HEADER_TIMEOUT:-10s}
      KOMARI_HTTP_READ_TIMEOUT: ${KOMARI_HTTP_READ_TIMEOUT:-0}
      KOMARI_HTTP_WRITE_TIMEOUT: ${KOMARI_HTTP_WRITE_TIMEOUT:-0}
      KOMARI_HTTP_IDLE_TIMEOUT: ${KOMARI_HTTP_IDLE_TIMEOUT:-120s}
      KOMARI_HTTP_MAX_BODY_BYTES: ${KOMARI_HTTP_MAX_BODY_BYTES:-4194304}
      KOMARI_SECURITY_HSTS: ${KOMARI_SECURITY_HSTS:-false}
      KOMARI_CLOUD_SECRET_KEY: ${KOMARI_CLOUD_SECRET_KEY:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    volumes:
      - ./data:/app/data

volumes:
  mysql-data:
